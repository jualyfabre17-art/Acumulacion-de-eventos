<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Integral de Intentos Fallidos</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
    body {
        font-family: Arial;
        background-color: #f4f4f4;
        text-align: center;
        padding: 30px;
    }

    .container {
        width: 85%;
        margin: auto;
        background: white;
        padding: 20px;
        border-radius: 10px;
    }

    input, select {
        padding: 10px;
        font-size: 16px;
        margin: 5px;
        width: 120px;
        text-align: center;
    }

    button {
        padding: 10px 20px;
        font-size: 16px;
        cursor: pointer;
    }

    #resultado {
        margin-top: 15px;
        font-size: 18px;
        font-weight: bold;
    }
</style>
</head>

<body>

<div class="container">
    <h1>Simulación de Integral - Ciberseguridad</h1>

    <p><strong>Selecciona el caso:</strong></p>
    <select id="caso">
        <option value="facebook">Caso Facebook (creciente)</option>
        <option value="microsoft">Caso Microsoft (decreciente)</option>
    </select>

    <p><strong>Intervalo de integración:</strong></p>
    <input type="number" id="inicio" value="0"> a
    <input type="number" id="fin" value="4">

    <br><br>
    <button onclick="generarGrafica()">Calcular Integral</button>

    <div id="resultado"></div>

    <canvas id="grafica"></canvas>
</div>

<script>
    let chart;

    // Funciones de cada caso
    function funcionFacebook(t) {
        return 5*t + 10;
    }

    function funcionMicrosoft(t) {
        return -3*t + 30;
    }

    // Integral exacta de cada función
    function integralFacebook(a, b) {
        return (5/2)*b*b + 10*b - ((5/2)*a*a + 10*a);
    }

    function integralMicrosoft(a, b) {
        return (-3/2)*b*b + 30*b - ((-3/2)*a*a + 30*a);
    }

    function generarGrafica() {
        let caso = document.getElementById("caso").value;
        let a = parseFloat(document.getElementById("inicio").value);
        let b = parseFloat(document.getElementById("fin").value);

        let f, integral;

        if (caso === "facebook") {
            f = funcionFacebook;
            integral = integralFacebook(a, b);
        } else {
            f = funcionMicrosoft;
            integral = integralMicrosoft(a, b);
        }

        let tiempo = [];
        let valores = [];

        for (let t = a; t <= b; t += 0.1) {
            tiempo.push(t.toFixed(1));
            valores.push(f(t));
        }

        const ctx = document.getElementById('grafica').getContext('2d');

        if (chart) chart.destroy();

        chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: tiempo,
                datasets: [
                    {
                        label: 'Función seleccionada',
                        data: valores,
                        fill: true, // área sombreada (integral)
                        tension: 0.3
                    }
                ]
            },
            options: {
                scales: {
                    x: {
                        title: {
                            display: true,
                            text: 'Tiempo (minutos)'
                        }
                    },
                    y: {
                        title: {
                            display: true,
                            text: 'Intentos fallidos por minuto'
                        }
                    }
                }
            }
        });

        document.getElementById("resultado").innerHTML =
            "Resultado de la integral: " + integral.toFixed(2) + " intentos acumulados";
    }

    generarGrafica();
</script>

</body>
</html>
